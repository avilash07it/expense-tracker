<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Expense Tracker</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
</head>
<body>
    <div class="app-container">
        <header>
            <h2 style="margin:0" class="logo">KoinTrackr</h2>

            <nav id="topNav">
                <a href="index.html" class="active">Expenses</a>
                <a href="report.html">Report</a>
                <a href="register.html">Auth</a>
            </nav>

            <button class="logout-btn" onclick="logout()">Logout</button>
        </header>

        <div class="container">
            <div class="page-top">
                <h1 style="margin:0">All Expenses</h1>
                <button class="new_expense" type="button">+ Add New</button>
            </div>

            <div class="main"></div>

            <div class="filter-box">
                <input type="text" id="filterCategory" placeholder="Search Category">
                <input type="date" id="startDate">
                <input type="date" id="endDate">

                <select id="sortOption">
                    <option value="">Sort</option>
                    <option value="amount_asc">Price Low</option>
                    <option value="amount_desc">Price High</option>
                    <option value="date">Newest First</option>
                </select>

                <button type="button" onclick="applyFilters()">Apply</button>
                <button type="button" onclick="resetFilters()">Reset</button>
            </div>

            <table>
                <thead>
                    <tr>
                        <th>Amount</th>
                        <th>Category</th>
                        <th>Date</th>
                        <th>Description</th>
                        <th>Payment</th>
                        <th>Actions</th>
                    </tr>
                </thead>
                <tbody id="expenseTable"></tbody>
            </table>
        </div>
    </div>

    <script src="expense.js"></script>
</body>
</html>
