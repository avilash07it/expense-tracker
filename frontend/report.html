<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Summary / Report</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    </head>

<body class="report-page">
    <div class="app-container">
        <header>
            <h2 style="margin:0" class="logo">KoinTrackr</h2>
            <nav id="topNav">
                <a href="index.html">Expenses</a>
                <a href="report.html" class="active">Report</a>
                <a href="register.html">Auth</a>
            </nav>
            <button class="logout-btn" onclick="logout()">Logout</button>
        </header>

        <div class="main">
            <h1>Financial Insights</h1>
            
            <div class="report-grid">
                <div class="stat-card">
                    <h3>Total Spent</h3>
                    <p id="totalMonthDisplay">₹0.00</p>
                </div>
                <div class="stat-card">
                    <h3>Top Category</h3>
                    <p id="topCategoryDisplay">-</p>
                </div>
                <div class="stat-card" style="border-right: none;">
                    <h3>Daily Average</h3>
                    <p id="dailyAvgDisplay">₹0.00</p>
                </div>
            </div>

            <div class="form-card">
                <h3 style="margin-top:0; margin-bottom: 25px;">Category Breakdown</h3>
                <div id="categoryLeaderboard">
                    </div>
            </div>
        </div>
    </div>
    <script src="report.js"></script>
</body>
</html>
